# ════════════════════════════════════════════════════════════════════
# logrotate — Rotación de logs del backend UPC ABET
#
# Instalar:
#   sudo cp deploy/logrotate-upc.conf /etc/logrotate.d/upc-abet
#
# logrotate corre automáticamente vía systemd (logrotate.timer).
# ════════════════════════════════════════════════════════════════════

/opt/upc-abet/backend/logs/*.jsonl {
    weekly
    rotate 8
    compress
    compresscmd /bin/gzip
    delaycompress
    missingok
    notifempty
    create 0644 upc upc
    dateext
    dateformat -%Y%m%d
    su upc upc
}
