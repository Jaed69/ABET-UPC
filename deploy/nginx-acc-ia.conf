# ════════════════════════════════════════════════════════════════════
# Nginx — reverse proxy para UPC ABET
# Dominio: acc-ia.tcupc.pe
#
# Instalar:
#   sudo cp deploy/nginx-acc-ia.conf /etc/nginx/sites-available/acc-ia
#   sudo ln -s /etc/nginx/sites-available/acc-ia /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# HTTPS con Let's Encrypt:
#   sudo certbot --nginx -d acc-ia.tcupc.pe
#   (certbot modifica este archivo automáticamente para añadir SSL)
# ════════════════════════════════════════════════════════════════════

# Upstream del backend FastAPI
upstream upc_abet_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name acc-ia.tcupc.pe;

    # Redirigir HTTP → HTTPS (después de certbot, esto lo hace automático)
    # Descomentar tras obtener el certificado:
    # return 301 https://$host$request_uri;

    # ── Si NO hay HTTPS todavía, servir todo por HTTP ──
    # (comentar el return 301 de arriba y descomentar el location de abajo)

    client_max_body_size 25M;

    # ── API (Streaming SSE crítico) ──
    location /api/ {
        proxy_pass http://upc_abet_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE: NO bufferizar, timeouts largos (el LLM tarda)
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 10s;

        # Soportar conexiones keepalive
        proxy_set_header Connection "";
    }

    # ── Estáticos (frontend) ──
    location / {
        proxy_pass http://upc_abet_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Caché de estáticos
        location ~* \.(ico|png|jpg|jpeg|gif|svg|css|js|woff2?)$ {
            proxy_pass http://upc_abet_backend;
            proxy_cache_valid 200 1d;
            expires 1d;
            add_header Cache-Control "public, immutable";
        }
    }
}

# ── Bloque HTTPS (certbot lo añade/modifica automáticamente) ──
# Tras ejecutar: sudo certbot --nginx -d acc-ia.tcupc.pe
# certbot generará un bloque server { listen 443 ssl; ... } basado en el de arriba.
